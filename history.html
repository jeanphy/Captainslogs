<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="History - Your celestial journey across the stars." name="description" />
    <title>Archive of Stars - Captain's Log</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#dec48c",
                        "primary": "#ccbeff",
                        "background": "#161021",
                        "surface": "#161021",
                        "on-surface": "#e9def6",
                        "on-surface-variant": "#cbc4cf",
                        "primary-container": "#2d0a7d",
                        "surface-container-low": "#1f192a",
                        "surface-container-high": "#2d2739",
                        "surface-container-highest": "#383244",
                        "outline-variant": "#49454e"
                    },
                    "borderRadius": {
                        "xl": "1.5rem",
                        "3xl": "2.5rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"]
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #161021; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-panel { background: rgba(31, 25, 42, 0.4); backdrop-filter: blur(40px); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #383244; border-radius: 10px; }

        /* Skewed entry card */
        .skew-card {
            transform: skewX(-3deg);
            border-radius: 6px;
        }
        .skew-card .skew-inner {
            transform: skewX(3deg);
        }
    </style>
</head>

<body class="bg-surface text-on-surface min-h-screen pb-32">
    <!-- Ambient Background -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <canvas id="space-canvas" class="absolute inset-0 w-full h-full"></canvas>
        <div id="cursor-glow" class="fixed w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px] pointer-events-none -translate-x-1/2 -translate-y-1/2 z-[-1] opacity-0 transition-opacity duration-1000"></div>
    </div>

    <!-- App Bar (Consistent with Inspiration) -->
    <header class="fixed top-0 w-full z-50 bg-[#161021]/60 backdrop-blur-xl border-b border-outline-variant/10 flex items-center justify-between px-6 h-16 transition-opacity duration-1000">
        <div class="flex items-center gap-4">
            <button id="logout-btn" class="text-on-surface-variant hover:text-primary transition-colors p-2 rounded-full">
                <span class="material-symbols-outlined">logout</span>
            </button>
            <h1 class="text-[#CCBEFF] font-headline text-lg font-bold tracking-tighter uppercase whitespace-nowrap">Captain's Log</h1>
        </div>
        <div class="hidden md:block text-xs font-bold text-primary/60 font-headline tracking-widest uppercase">
            captain's log <span id="header-stardate">stardate</span>
        </div>
        <div class="w-10"></div> <!-- Spacer -->
    </header>

    <main class="relative z-10 pt-24 px-4 md:px-8 max-w-4xl mx-auto min-h-screen">
        <!-- View Controls / Header Section -->
        <section class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <h2 class="text-on-surface font-headline text-4xl md:text-5xl font-extrabold tracking-tight mb-2">Archive of Stars</h2>
                <p class="text-on-surface-variant font-body text-lg opacity-70">Retrace your cosmic journey across the void.</p>
            </div>
            <div class="flex items-center bg-surface-container-low/50 backdrop-blur-md p-1.5 rounded-2xl border border-white/5 shadow-inner">
                <button id="view-feed" class="px-6 py-2.5 rounded-xl text-sm font-semibold tracking-wide transition-all bg-primary-container text-primary">Feed</button>
                <button id="view-day" class="px-6 py-2.5 rounded-xl text-sm font-semibold tracking-wide transition-all text-on-surface-variant hover:text-on-surface">Day</button>
                <button id="view-week" class="px-6 py-2.5 rounded-xl text-sm font-semibold tracking-wide transition-all text-on-surface-variant hover:text-on-surface opacity-40 cursor-not-allowed">Week</button>
            </div>
        </section>

        <!-- Timeline Container -->
        <div id="logs-container" class="space-y-6">
            <!-- Dynamically populated cards -->
            <div class="py-20 text-center opacity-40">
                <span class="material-symbols-outlined text-5xl mb-4 animate-pulse">tsunami</span>
                <p class="text-sm tracking-widest uppercase">Synchronizing Archives...</p>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation: 2 Buttons -->
    <nav class="fixed bottom-0 left-0 w-full flex justify-center gap-3 px-6 pb-8 pt-4 bg-[#1F192A]/80 backdrop-blur-2xl z-50 border-t border-white/5">
        <a href="index.html" class="flex items-center gap-2 px-8 py-3 rounded-2xl text-on-surface-variant hover:text-primary hover:bg-surface-container-high transition-all duration-200 group">
            <span class="material-symbols-outlined text-xl">add_circle</span>
            <span class="font-headline text-xs uppercase tracking-[0.2em] font-bold">New Entry</span>
        </a>
        <button class="flex items-center gap-2 px-8 py-3 rounded-2xl bg-primary-container text-primary font-bold cursor-default">
            <span class="material-symbols-outlined text-xl">history</span>
            <span class="font-headline text-xs uppercase tracking-[0.2em] font-bold">History</span>
        </button>
    </nav>

    <script type="importmap">
        {
          "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js"
          }
        }
    </script>
    <script type="module" src="history.js"></script>
</body>
</html>
